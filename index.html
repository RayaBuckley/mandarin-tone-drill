<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Mandarin Tone Drill</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111827">

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111827;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-top: 10px;
      margin-bottom: 8px;
    }

    .card {
      max-width: 500px;
      margin: auto;
      background: #1f2937;
      border-radius: 16px;
      padding: 20px;
    }

    button {
      font-size: 24px;
      border: none;
      border-radius: 12px;
      padding: 20px;
      margin: 8px;
      cursor: pointer;
    }

    .play {
      width: calc(100% - 16px);
      background: #2563eb;
      color: white;
    }

    .tone-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .tone {
      background: #374151;
      color: white;
      min-height: 90px;
    }

    .correct {
      background: #16a34a !important;
    }

    .wrong {
      background: #dc2626 !important;
    }

    #status {
      margin-top: 20px;
      min-height: 30px;
      font-size: 18px;
    }

    #score {
      margin-top: 10px;
      color: #9ca3af;
    }

    #prompt {
      margin-top: 16px;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 0.04em;
      min-height: 58px;
    }

    #small {
      margin-top: 6px;
      font-size: 14px;
      color: #9ca3af;
      min-height: 18px;
    }
  </style>
</head>

<body>
<div class="card">
  <h1>Mandarin Tone Drill</h1>

  <div id="prompt"></div>
  <div id="small">Audio uses Hanzi instead of pinyin for this test.</div>

  <button class="play" onclick="playCurrent()">▶ Play</button>

  <div class="tone-grid">
    <button class="tone" onclick="guess(1)">1</button>
    <button class="tone" onclick="guess(2)">2</button>
    <button class="tone" onclick="guess(3)">3</button>
    <button class="tone" onclick="guess(4)">4</button>
  </div>

  <div id="status">Press Play</div>
  <div id="score">Correct: 0 / 0</div>
</div>

<script>
const items = [
  { syllable: "ma", tones: { 1: "妈", 2: "麻", 3: "马", 4: "骂" } },
  { syllable: "ba", tones: { 1: "八", 2: "拔", 3: "把", 4: "爸" } },
  { syllable: "da", tones: { 1: "搭", 2: "达", 3: "打", 4: "大" } },
  { syllable: "la", tones: { 1: "拉", 2: "啦", 3: "喇", 4: "辣" } },
  { syllable: "na", tones: { 1: "那", 2: "拿", 3: "哪", 4: "纳" } },
  { syllable: "ta", tones: { 1: "他", 2: "塔", 3: "塔", 4: "踏" } },
  { syllable: "ka", tones: { 1: "喀", 2: "咔", 3: "卡", 4: "卡" } },
  { syllable: "ni", tones: { 1: "呢", 2: "尼", 3: "你", 4: "逆" } },
  { syllable: "hao", tones: { 1: "好", 2: "豪", 3: "好", 4: "号" } },
  { syllable: "wo", tones: { 1: "窝", 2: "我", 3: "我", 4: "握" } },
  { syllable: "ren", tones: { 1: "扔", 2: "人", 3: "忍", 4: "任" } },
  { syllable: "hua", tones: { 1: "花", 2: "华", 3: "滑", 4: "画" } },
  { syllable: "guo", tones: { 1: "锅", 2: "国", 3: "果", 4: "过" } },
  { syllable: "xue", tones: { 1: "薛", 2: "学", 3: "雪", 4: "血" } }
];

const tones = [1, 2, 3, 4];
let currentSyllable = "";
let currentTone = 1;
let correct = 0;
let total = 0;
let revealed = false;

function spokenHanzi(syllable, tone) {
  const item = items.find((x) => x.syllable === syllable);
  if (!item) return syllable;
  return item.tones[tone] || syllable;
}

function updateUI() {
  document.getElementById("prompt").textContent = spokenHanzi(currentSyllable, currentTone);
}

function newQuestion() {
  const item = items[Math.floor(Math.random() * items.length)];
  currentSyllable = item.syllable;
  currentTone = tones[Math.floor(Math.random() * tones.length)];
  revealed = false;
  document.getElementById("status").textContent = "Listen and choose 1–4";
  updateUI();
}

function playCurrent() {
  const text = spokenHanzi(currentSyllable, currentTone);
  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "zh-CN";
  utter.rate = 0.9;
  utter.pitch = 1;

  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => /zh|cmn|Chinese/i.test(v.lang) || /Chinese/i.test(v.name));
  if (zhVoice) {
    utter.voice = zhVoice;
  }

  speechSynthesis.speak(utter);
}

function guess(answer) {
  if (revealed) return;
  revealed = true;
  total++;

  const allButtons = Array.from(document.querySelectorAll(".tone"));
  allButtons.forEach((btn) => btn.classList.remove("correct", "wrong"));

  if (answer === currentTone) {
    correct++;
    document.getElementById("status").textContent = "✓ Correct (" + spokenHanzi(currentSyllable, currentTone) + ")";
    allButtons[answer - 1].classList.add("correct");
  } else {
    document.getElementById("status").textContent = "✗ Wrong (" + spokenHanzi(currentSyllable, currentTone) + ", Tone " + currentTone + ")";
    allButtons[answer - 1].classList.add("wrong");
    allButtons[currentTone - 1].classList.add("correct");
  }

  document.getElementById("score").textContent = "Correct: " + correct + " / " + total;

  setTimeout(() => {
    allButtons.forEach((btn) => btn.classList.remove("correct", "wrong"));
    newQuestion();
    playCurrent();
  }, 900);
}

newQuestion();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("Service worker registered"))
      .catch((err) => console.error("Service worker registration failed:", err));
  });
}
</script>
</body>
</html>
