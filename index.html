<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Mandarin Tone Drill</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111827">

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111827;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-top: 10px;
      margin-bottom: 8px;
    }

    .card {
      max-width: 560px;
      margin: auto;
      background: #1f2937;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    button, input {
      font-size: 18px;
      border: none;
      border-radius: 12px;
      padding: 16px;
      margin: 8px 0;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    .play {
      background: #2563eb;
      color: white;
      font-size: 22px;
      padding: 18px;
    }

    .tone-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .tone {
      background: #374151;
      color: white;
      min-height: 86px;
      font-size: 30px;
      font-weight: 700;
    }

    .correct {
      background: #16a34a !important;
    }

    .wrong {
      background: #dc2626 !important;
    }

    #status {
      margin-top: 18px;
      min-height: 30px;
      font-size: 18px;
    }

    #score {
      margin-top: 10px;
      color: #9ca3af;
    }

    #prompt {
      margin-top: 14px;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 0.04em;
      min-height: 58px;
    }

    #small {
      margin-top: 6px;
      font-size: 14px;
      color: #9ca3af;
      min-height: 18px;
      line-height: 1.4;
    }

    .section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #374151;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .secondary {
      background: #374151;
      color: white;
    }

    .ghost {
      background: #0f172a;
      color: #cbd5e1;
      border: 1px solid #334155;
    }

    .label {
      text-align: left;
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    input {
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
      outline: none;
    }

    .mini {
      font-size: 14px;
      color: #9ca3af;
      text-align: left;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
<div class="card">
  <h1>Mandarin Tone Drill</h1>

  <div id="prompt"></div>
  <div id="small">Audio test mode uses multiple text forms so we can see what Safari's voice handles best.</div>

  <button class="play" onclick="playCurrent()">▶ Play current test</button>

  <div class="mode-row">
    <button class="secondary" onclick="nextTest()">Next test</button>
    <button class="secondary" onclick="runAllTests()">Run all tests</button>
  </div>

  <div class="tone-grid">
    <button class="tone" onclick="guess(1)">1</button>
    <button class="tone" onclick="guess(2)">2</button>
    <button class="tone" onclick="guess(3)">3</button>
    <button class="tone" onclick="guess(4)">4</button>
  </div>

  <div id="status">Press Play</div>
  <div id="score">Correct: 0 / 0</div>

  <div class="section">
    <div class="label">Custom text to speak</div>
    <input id="customText" type="text" value="好" placeholder="Type text like 好 or hǎo or hao3" />
    <div class="mode-row">
      <button class="ghost" onclick="speakText(document.getElementById('customText').value)">Speak custom text</button>
      <button class="ghost" onclick="setCustom('你好')">Try 你好</button>
    </div>
    <div class="mini">
      Use this to compare exactly how Safari behaves with Hanzi, pinyin, and tone-marked pinyin.
    </div>
  </div>
</div>

<script>
const items = [
  { syllable: "ma", tones: { 1: "妈", 2: "麻", 3: "马", 4: "骂" } },
  { syllable: "ba", tones: { 1: "八", 2: "拔", 3: "把", 4: "爸" } },
  { syllable: "da", tones: { 1: "搭", 2: "达", 3: "打", 4: "大" } },
  { syllable: "la", tones: { 1: "拉", 2: "啦", 3: "喇", 4: "辣" } },
  { syllable: "na", tones: { 1: "那", 2: "拿", 3: "哪", 4: "纳" } },
  { syllable: "ta", tones: { 1: "他", 2: "塔", 3: "塔", 4: "踏" } },
  { syllable: "ka", tones: { 1: "喀", 2: "咔", 3: "卡", 4: "卡" } },
  { syllable: "ni", tones: { 1: "呢", 2: "尼", 3: "你", 4: "逆" } },
  { syllable: "hao", tones: { 1: "好", 2: "豪", 3: "好", 4: "号" } },
  { syllable: "wo", tones: { 1: "窝", 2: "我", 3: "我", 4: "握" } },
  { syllable: "ren", tones: { 1: "扔", 2: "人", 3: "忍", 4: "任" } },
  { syllable: "hua", tones: { 1: "花", 2: "华", 3: "滑", 4: "画" } },
  { syllable: "guo", tones: { 1: "锅", 2: "国", 3: "果", 4: "过" } },
  { syllable: "xue", tones: { 1: "薛", 2: "学", 3: "雪", 4: "血" } }
];

const tones = [1, 2, 3, 4];
const testModes = [
  { name: "Hanzi only", kind: "hanzi" },
  { name: "Pinyin only", kind: "pinyin" },
  { name: "Tone-mark pinyin", kind: "toneMark" },
  { name: "Hanzi + pinyin", kind: "mixed" },
  { name: "Two-character phrase", kind: "phrase" }
];

let currentSyllable = "";
let currentTone = 1;
let correct = 0;
let total = 0;
let revealed = false;
let testIndex = 0;
let allTestTimer = null;

function toneMarked(syllable, tone) {
  const map = {
    1: { a: "ā", e: "ē", i: "ī", o: "ō", u: "ū" },
    2: { a: "á", e: "é", i: "í", o: "ó", u: "ú" },
    3: { a: "ǎ", e: "ě", i: "ǐ", o: "ǒ", u: "ǔ" },
    4: { a: "à", e: "è", i: "ì", o: "ò", u: "ù" }
  };

  for (const vowel of ["a", "e", "o", "i", "u"]) {
    const index = syllable.indexOf(vowel);
    if (index !== -1) {
      return syllable.slice(0, index) + map[tone][vowel] + syllable.slice(index + 1);
    }
  }
  return syllable;
}

function currentItem() {
  return items.find((x) => x.syllable === currentSyllable) || items[0];
}

function spokenForMode(mode, syllable, tone) {
  const item = items.find((x) => x.syllable === syllable) || items[0];
  const hanzi = item.tones[tone] || syllable;
  const pinyin = syllable;
  const marked = toneMarked(syllable, tone);

  switch (mode.kind) {
    case "hanzi":
      return hanzi;
    case "pinyin":
      return pinyin;
    case "toneMark":
      return marked;
    case "mixed":
      return `${hanzi} (${marked})`;
    case "phrase":
      return `${hanzi}${hanzi}`;
    default:
      return hanzi;
  }
}

function updateUI() {
  const mode = testModes[testIndex];
  document.getElementById("prompt").textContent = `${mode.name}`;
  document.getElementById("small").textContent = `Current item: ${currentSyllable || "?"} tone ${currentTone}. Spoken text will be: ${spokenForMode(mode, currentSyllable, currentTone)}`;
}

function newQuestion() {
  const item = items[Math.floor(Math.random() * items.length)];
  currentSyllable = item.syllable;
  currentTone = tones[Math.floor(Math.random() * tones.length)];
  revealed = false;
  document.getElementById("status").textContent = "Listen and choose 1–4";
  updateUI();
}

function speakText(text) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "zh-CN";
  utter.rate = 0.9;
  utter.pitch = 1;

  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => /zh|cmn|Chinese/i.test(v.lang) || /Chinese/i.test(v.name));
  if (zhVoice) utter.voice = zhVoice;

  utter.onstart = () => document.getElementById("status").textContent = `Speaking: ${text}`;
  utter.onend = () => document.getElementById("status").textContent = "Finished speaking";
  utter.onerror = () => document.getElementById("status").textContent = "Speech error";
  speechSynthesis.speak(utter);
}

function playCurrent() {
  const mode = testModes[testIndex];
  const text = spokenForMode(mode, currentSyllable, currentTone);
  speakText(text);
}

function nextTest() {
  testIndex = (testIndex + 1) % testModes.length;
  updateUI();
  document.getElementById("status").textContent = `Switched to ${testModes[testIndex].name}`;
}

function runAllTests() {
  if (allTestTimer) {
    clearInterval(allTestTimer);
    allTestTimer = null;
  }

  const sequence = [];
  for (const mode of testModes) {
    sequence.push(mode);
  }

  let i = 0;
  const start = () => {
    if (i >= sequence.length) {
      document.getElementById("status").textContent = "All tests finished";
      allTestTimer = null;
      return;
    }
    testIndex = testModes.findIndex((m) => m.name === sequence[i].name);
    updateUI();
    const text = spokenForMode(testModes[testIndex], currentSyllable, currentTone);
    speakText(text);
    i++;
  };

  start();
  allTestTimer = setInterval(start, 2200);
}

function setCustom(value) {
  const el = document.getElementById("customText");
  el.value = value;
  speakText(value);
}

function guess(answer) {
  if (revealed) return;
  revealed = true;
  total++;

  const allButtons = Array.from(document.querySelectorAll(".tone"));
  allButtons.forEach((btn) => btn.classList.remove("correct", "wrong"));

  if (answer === currentTone) {
    correct++;
    document.getElementById("status").textContent = "✓ Correct (" + spokenForMode(testModes[testIndex], currentSyllable, currentTone) + ")";
    allButtons[answer - 1].classList.add("correct");
  } else {
    document.getElementById("status").textContent = "✗ Wrong (" + spokenForMode(testModes[testIndex], currentSyllable, currentTone) + ", Tone " + currentTone + ")";
    allButtons[answer - 1].classList.add("wrong");
    allButtons[currentTone - 1].classList.add("correct");
  }

  document.getElementById("score").textContent = "Correct: " + correct + " / " + total;

  setTimeout(() => {
    allButtons.forEach((btn) => btn.classList.remove("correct", "wrong"));
    newQuestion();
    playCurrent();
  }, 1100);
}

newQuestion();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("Service worker registered"))
      .catch((err) => console.error("Service worker registration failed:", err));
  });
}
</script>
</body>
</html>
